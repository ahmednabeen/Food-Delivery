<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="container">
      <div class="card left-card">
        <img
          src="https://megaone.acrothemes.com/food-delivery/img/login-half-block.jpg"
          alt="Food Delivery Image"
        />
      </div>
      <div class="card right-card">
        <div class="row-top">
          <div class="logo-container">
            <img src="images/logo.png" alt="Logo" class="logo" />
          </div>
          <p style="color: brown">Lorem ipsum dolor sit amet</p>
          <h1>Get more things, done with <br />Loggin platform.</h1>
          <p>
            Access to the most powerful tool in the entire design <br />and web
            industry.
          </p>
          <input type="email" class="input-field" placeholder="Email" />
          <input type="password" class="input-field" placeholder="Password" />
          <div class="button-container">
            <button class="login-button"><b>LOGIN</b></button>
            <a href="#" class="register-link">Not Registered Yet?</a>
          </div>
        </div>
        <div class="row-bottom">
          <div class="link-container">
            <div class="vertical-links">
              <a href="#" class="register-link">Browse Food</a>
              <a href="#" class="register-link">Download App</a>
            </div>
            <a href="#" class="register-link" style="margin-top: 2rem"
              >About Us</a
            >
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
